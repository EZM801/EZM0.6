version: 0.2
phases:
  install:
    runtime-versions:
      nodejs: 18
    commands:
      - echo "Setting up npm configuration..."
      - npm config set registry https://registry.npmjs.org/
      - npm config set strict-ssl false
      - npm cache clean --force
  pre_build:
    commands:
      - echo "Installing dependencies with fallback options..."
      - npm install --no-optional --no-shrinkwrap --no-package-lock || npm install --legacy-peer-deps || npm install --force
  build:
    commands:
      - echo "Build started on $(date)"
      - npm run build || echo "No build script found, skipping..."
  post_build:
    commands:
      - echo "Build completed on $(date)"
artifacts:
  files:
    - '**/*'
  name: ezm-build-artifacts
