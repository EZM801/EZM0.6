# Nginx vhost template for EZM0.5 (Next.js on port 3000).
# Install: sudo apt install nginx   or   sudo yum install nginx
# Use: sudo cp deploy/nginx-ezm.conf /etc/nginx/conf.d/ezm.conf
#      sudo nginx -t && sudo systemctl reload nginx
# Replace your-domain.com and ensure SSL certs exist (e.g. certbot).

upstream ezm_next {
    server 127.0.0.1:3000;
    keepalive 64;
}

# HTTP -> HTTPS (uncomment when SSL is ready)
# server {
#     listen 80;
#     server_name your-domain.com;
#     return 301 https://$server_name$request_uri;
# }

server {
    listen 80;
    # listen 443 ssl http2;
    server_name your-domain.com;

    # SSL (uncomment and set paths when using certbot)
    # ssl_certificate     /etc/letsencrypt/live/your-domain.com/fullchain.pem;
    # ssl_certificate_key /etc/letsencrypt/live/your-domain.com/privkey.pem;

    location / {
        proxy_pass http://ezm_next;
        proxy_http_version 1.1;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection 'upgrade';
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
        proxy_read_timeout 86400;
    }
}
